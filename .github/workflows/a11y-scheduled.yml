name: Accessibility (scheduled)

# Nightly production scan. Use alongside the PR-triggered workflow.
# axle users can copy this file into any repo to get drift/regression
# detection for their live site without changing any deployment code.

on:
  schedule:
    # 03:17 UTC every day — off the top of the hour to dodge runner rushes.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      urls:
        description: "Comma-separated list of URLs to scan"
        required: false
        type: string
      fail-on:
        description: "Severity to treat as failure"
        required: false
        type: choice
        default: serious
        options: [critical, serious, moderate, minor, none]

permissions:
  contents: read
  issues: write

concurrency:
  group: a11y-scheduled-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    name: nightly axe + ai
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        if: steps.pw.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install system deps
        if: steps.pw.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scans
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          URLS: ${{ inputs.urls || vars.A11Y_SCAN_URLS || '' }}
          FAIL_ON: ${{ inputs.fail-on || 'serious' }}
        run: |
          if [ -z "$URLS" ]; then
            echo "No URLs configured. Set inputs.urls, or the A11Y_SCAN_URLS repository variable (comma-separated)."
            echo "No target URLs." > a11y-summary.md
            exit 0
          fi
          IFS=',' read -r -a ARR <<< "$URLS"
          mkdir -p reports
          worst_exit=0
          for raw in "${ARR[@]}"; do
            u=$(echo "$raw" | xargs)
            safe=$(echo "$u" | sed 's#[^a-zA-Z0-9]#_#g')
            echo "=== scanning $u ==="
            set +e
            npm run a11y:ci -- \
              --url "$u" \
              --fail-on "$FAIL_ON" \
              --with-ai-fixes false \
              --json-out "reports/${safe}.json" \
              --markdown-out "reports/${safe}.md"
            rc=$?
            set -e
            [ $rc -gt $worst_exit ] && worst_exit=$rc
          done
          {
            echo "# axle nightly accessibility summary"
            echo
            echo "Scanned at $(date -u +%Y-%m-%dT%H:%M:%SZ). Threshold: \`$FAIL_ON\`."
            echo
            for f in reports/*.md; do
              echo "---"
              cat "$f"
              echo
            done
          } > a11y-summary.md
          exit $worst_exit

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-nightly-${{ github.run_id }}
          path: |
            reports/
            a11y-summary.md

      - name: Open / update tracking issue on regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            if (!fs.existsSync("a11y-summary.md")) return;
            const body = fs.readFileSync("a11y-summary.md", "utf8");
            const marker = "<!-- axle-nightly -->";
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: "open",
              labels: "accessibility-regression",
              per_page: 10,
            });
            const existing = issues.find((i) => i.body?.includes(marker));
            const full = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: existing.number,
                body: full,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title: `Accessibility regression detected (${new Date().toISOString().slice(0, 10)})`,
                body: full,
                labels: ["accessibility-regression", "axle"],
              });
            }
