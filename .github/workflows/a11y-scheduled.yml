name: Accessibility (scheduled)

# Nightly production scan. Use alongside the PR-triggered workflow.
# axle users can copy this file into any repo to get drift/regression
# detection for their live site without changing any deployment code.

on:
  schedule:
    # 03:17 UTC every day — off the top of the hour to dodge runner rushes.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      urls:
        description: "Comma-separated URLs to scan. Leave empty to scan everything in the site's sitemap."
        required: false
        type: string
      site:
        description: "Origin whose sitemap is scanned when `urls` is empty."
        required: false
        type: string
      fail-on:
        description: "Severity to treat as failure"
        required: false
        type: choice
        default: serious
        options: [critical, serious, moderate, minor, none]

permissions:
  contents: read
  issues: write

concurrency:
  group: a11y-scheduled-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    name: nightly axe + ai
    runs-on: ubuntu-24.04
    # 15 minutes was a fine budget while this job scanned nothing and finished in
    # 40s. Now that it installs a browser and sweeps the whole sitemap, 15 was
    # enough to get cancelled mid-install — a fresh, uncached run needs room for
    # the download plus ~55 page scans.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # The browser set is part of the key. Without it, a cache populated
          # before chromium-headless-shell was added would keep restoring an
          # incomplete install and skip the step that fixes it.
          key: playwright-shell-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium headless shell
        if: steps.pw.outputs.cache-hit != 'true'
        # lib/scanner.ts calls chromium.launch({ headless: true }), which resolves
        # to chrome-headless-shell — a *separate* download from chromium. The
        # workflow used to install only chromium, so the scan could never launch
        # a browser. Only the shell is needed; pulling full chromium as well just
        # doubles a download that already ran this job into its timeout.
        run: npx playwright install chromium-headless-shell --with-deps

      - name: Install system deps
        if: steps.pw.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scans
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          URLS: ${{ inputs.urls || vars.A11Y_SCAN_URLS || '' }}
          SITE: ${{ inputs.site || vars.A11Y_SITE_URL || 'https://axle-iota.vercel.app' }}
          FAIL_ON: ${{ inputs.fail-on || 'serious' }}
        run: |
          set -o pipefail
          # Targets are derived from the site's own sitemap unless explicitly
          # overridden. This step previously read a repository variable that was
          # never set and then exited 0, so 97 consecutive nightly runs reported
          # success having scanned nothing at all. Deriving the list means a new
          # page is covered the day it ships with nothing to keep in sync, and an
          # empty list is now a hard failure — a monitor that checks nothing must
          # never report success.
          if [ -n "$URLS" ]; then
            IFS=',' read -r -a ARR <<< "$URLS"
            echo "Using ${#ARR[@]} explicitly configured URL(s)."
          else
            echo "Deriving targets from ${SITE}/sitemap.xml"
            mapfile -t ARR < <(
              curl -sfS --max-time 30 "${SITE}/sitemap.xml" \
                | grep -oE '<loc>[^<]+</loc>' \
                | sed -e 's#</\?loc>##g' -e 's#[[:space:]]##g'
            ) || true
          fi
          if [ "${#ARR[@]}" -eq 0 ]; then
            echo "::error::No URLs to scan — could not read ${SITE}/sitemap.xml and no URLs were configured. Failing loudly rather than reporting a green pass for zero coverage."
            exit 1
          fi
          echo "Scanning ${#ARR[@]} URL(s)."
          mkdir -p reports
          worst_exit=0
          for raw in "${ARR[@]}"; do
            u=$(echo "$raw" | xargs)
            safe=$(echo "$u" | sed 's#[^a-zA-Z0-9]#_#g')
            echo "=== scanning $u ==="
            set +e
            npm run a11y:ci -- \
              --url "$u" \
              --fail-on "$FAIL_ON" \
              --with-ai-fixes false \
              --json-out "reports/${safe}.json" \
              --markdown-out "reports/${safe}.md"
            rc=$?
            set -e
            [ $rc -gt $worst_exit ] && worst_exit=$rc
          done
          {
            echo "# axle nightly accessibility summary"
            echo
            echo "Scanned at $(date -u +%Y-%m-%dT%H:%M:%SZ). Threshold: \`$FAIL_ON\`."
            echo
            for f in reports/*.md; do
              echo "---"
              cat "$f"
              echo
            done
          } > a11y-summary.md
          exit $worst_exit

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-nightly-${{ github.run_id }}
          path: |
            reports/
            a11y-summary.md

      - name: Open / update tracking issue on regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            if (!fs.existsSync("a11y-summary.md")) return;
            const body = fs.readFileSync("a11y-summary.md", "utf8");
            const marker = "<!-- axle-nightly -->";
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: "open",
              labels: "accessibility-regression",
              per_page: 10,
            });
            const existing = issues.find((i) => i.body?.includes(marker));
            const full = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: existing.number,
                body: full,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title: `Accessibility regression detected (${new Date().toISOString().slice(0, 10)})`,
                body: full,
                labels: ["accessibility-regression", "axle"],
              });
            }
