# Dogfood: axle scans its own marketing site on every PR.
# If axle regresses accessibility on its own homepage, the PR fails.
name: Accessibility

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  axle:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: asafamos/axle-action@v1
        with:
          # Build + start the Next.js app locally and scan http://localhost:3000
          install-command: npm ci
          build-command: npm run build
          start-command: npm start
          wait-on-port: "3000"
          fail-on: serious
          with-ai-fixes: "true"
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-on-pr: "true"
