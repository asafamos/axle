<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>axle</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        margin: 0;
        width: 360px;
        min-height: 220px;
        background: #f8fafc;
        color: #0f172a;
      }
      header { padding: 14px 16px 8px; display: flex; align-items: center; gap: 10px; }
      header .logo {
        width: 28px; height: 28px; border-radius: 6px;
        background: #0f172a; color: #fff;
        display: grid; place-items: center;
        font-weight: 800; font-size: 16px;
      }
      header h1 { margin: 0; font-size: 15px; font-weight: 700; }
      header .subtitle { font-size: 11px; color: #64748b; }
      main { padding: 8px 16px 16px; }
      button {
        width: 100%; padding: 10px 12px;
        background: #0f172a; color: #fff;
        border: 0; border-radius: 8px;
        font-size: 14px; font-weight: 600; cursor: pointer;
      }
      button:hover { background: #1e293b; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .summary { margin-top: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .summary div { text-align: center; padding: 8px 4px; border-radius: 6px; background: #fff; border: 1px solid #e2e8f0; }
      .summary div .n { font-weight: 700; font-size: 16px; }
      .summary div .l { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; }
      .critical .n { color: #dc2626; }
      .serious .n { color: #ea580c; }
      .moderate .n { color: #d97706; }
      .minor .n { color: #2563eb; }
      ul.rules { list-style: none; padding: 0; margin: 12px 0 0; max-height: 240px; overflow: auto; }
      ul.rules li { padding: 8px 10px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
      ul.rules .rule-id { font-family: ui-monospace, monospace; font-size: 10px; color: #64748b; }
      footer { padding: 10px 16px; border-top: 1px solid #e2e8f0; font-size: 11px; color: #64748b; text-align: center; }
      footer a { color: #0f172a; }
      .loading { text-align: center; padding: 20px; color: #64748b; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">a</div>
      <div>
        <h1>axle</h1>
        <div class="subtitle">Accessibility scanner</div>
      </div>
    </header>
    <main>
      <button id="scan">Scan this page</button>
      <div id="result"></div>
    </main>
    <footer>
      <a href="https://axle-iota.vercel.app" target="_blank">axle-iota.vercel.app</a> ·
      Real code fixes, no overlay widgets
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
