name: "axle — Accessibility Compliance CI"
description: "Scan every PR for WCAG 2.1 / 2.2 AA violations, optionally generate AI code fixes, comment inline, and block merge on regressions."
author: "axle"
branding:
  icon: shield
  color: green

inputs:
  url:
    description: "URL to scan. If empty, the action will attempt to build + start the project on localhost:3000 (requires an npm-based Node project)."
    required: false
    default: ""
  fail-on:
    description: "Severity threshold that fails the check: critical | serious | moderate | minor | none"
    required: false
    default: "serious"
  with-ai-fixes:
    description: "Generate AI fix suggestions using Claude Sonnet (requires anthropic-api-key)."
    required: false
    default: "false"
  max-ai-fixes:
    description: "Cap on the number of AI fix calls per run (cost control)."
    required: false
    default: "10"
  anthropic-api-key:
    description: "Anthropic API key used when with-ai-fixes is true. Keep it in repository secrets."
    required: false
  anthropic-model:
    description: "Model to use for AI fix generation."
    required: false
    default: "claude-sonnet-4-6"
  github-token:
    description: "Token used to post the PR comment. Defaults to the workflow-provided token."
    required: false
    default: ${{ github.token }}
  comment-on-pr:
    description: "Whether to post / update the axle comment on the triggering PR."
    required: false
    default: "true"
  create-issues:
    description: "When true, axle opens / updates / closes a GitHub Issue per WCAG violation. Issues are deduped by axe-core rule ID + first failing-node target hash. Useful when teams want a11y findings in their issue tracker (Linear / Jira mirror, Notion sync, board triage) rather than only as PR comments. Defaults to false. Requires github-token with `issues: write`."
    required: false
    default: "false"
  issue-labels:
    description: "Comma-separated labels applied to every axle-opened issue. axle adds the impact tier (`critical` / `serious` / `moderate` / `minor`) automatically."
    required: false
    default: "axle,accessibility,wcag"
  issue-fail-on:
    description: "Severity threshold for issue creation: critical | serious | moderate | minor. Lower-severity violations are not turned into issues. Defaults to mirror fail-on."
    required: false
    default: ""
  install-command:
    description: "Command used to install your project's dependencies (used only when url is empty)."
    required: false
    default: "npm ci"
  build-command:
    description: "Command to build the app before serving on localhost (used only when url is empty)."
    required: false
    default: "npm run build"
  start-command:
    description: "Command to start the app (backgrounded; used only when url is empty)."
    required: false
    default: "npm start"
  wait-on-port:
    description: "Port to wait for before scanning (used only when url is empty)."
    required: false
    default: "3000"

outputs:
  json-path:
    description: "Path to the full JSON scan report."
    value: ${{ steps.run.outputs.json-path }}
  markdown-path:
    description: "Path to the markdown report posted on the PR."
    value: ${{ steps.run.outputs.markdown-path }}
  failing:
    description: "'true' when violations were found at or above the fail-on threshold."
    value: ${{ steps.run.outputs.failing }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Resolve axle CLI package root
      id: axle-pkg
      shell: bash
      run: |
        # Composite actions expose their own source tree via github.action_path.
        # The CLI bundle ships next to this action.yml under ./cli.
        echo "dir=${{ github.action_path }}/cli" >> "$GITHUB_OUTPUT"

    - name: Install axle CLI dependencies
      shell: bash
      working-directory: ${{ steps.axle-pkg.outputs.dir }}
      run: npm ci --omit=optional

    - name: Cache Playwright browsers
      id: pw
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: axle-playwright-${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', steps.axle-pkg.outputs.dir)) }}

    - name: Install Chromium (cache miss)
      if: steps.pw.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ steps.axle-pkg.outputs.dir }}
      run: npx playwright install chromium --with-deps

    - name: Install Chromium system deps (cache hit)
      if: steps.pw.outputs.cache-hit == 'true'
      shell: bash
      working-directory: ${{ steps.axle-pkg.outputs.dir }}
      run: npx playwright install-deps chromium

    - name: Build + start host project (when url is empty)
      if: inputs.url == ''
      shell: bash
      run: |
        ${{ inputs.install-command }}
        ${{ inputs.build-command }}
        nohup ${{ inputs.start-command }} > axle-server.log 2>&1 &
        echo $! > axle-server.pid
        npx --yes wait-on "http://localhost:${{ inputs.wait-on-port }}" --timeout 90000

    - name: Scan
      id: run
      shell: bash
      working-directory: ${{ steps.axle-pkg.outputs.dir }}
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        ANTHROPIC_MODEL: ${{ inputs.anthropic-model }}
      run: |
        TARGET="${{ inputs.url }}"
        if [ -z "$TARGET" ]; then
          TARGET="http://localhost:${{ inputs.wait-on-port }}"
        fi
        set +e
        node dist/ci-scan.js \
          --url "$TARGET" \
          --fail-on "${{ inputs.fail-on }}" \
          --with-ai-fixes "${{ inputs.with-ai-fixes }}" \
          --max-ai-fixes "${{ inputs.max-ai-fixes }}" \
          --json-out "$GITHUB_WORKSPACE/axle-report.json" \
          --markdown-out "$GITHUB_WORKSPACE/axle-report.md"
        rc=$?
        set -e
        echo "json-path=$GITHUB_WORKSPACE/axle-report.json" >> "$GITHUB_OUTPUT"
        echo "markdown-path=$GITHUB_WORKSPACE/axle-report.md" >> "$GITHUB_OUTPUT"
        if [ $rc -eq 1 ]; then
          echo "failing=true" >> "$GITHUB_OUTPUT"
        else
          echo "failing=false" >> "$GITHUB_OUTPUT"
        fi
        exit $rc

    - name: Stop host project
      if: always() && inputs.url == ''
      shell: bash
      run: |
        if [ -f axle-server.pid ]; then
          kill "$(cat axle-server.pid)" 2>/dev/null || true
        fi

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: axle-report-${{ github.run_id }}
        path: |
          axle-report.json
          axle-report.md
          axle-server.log

    - name: Comment on PR
      if: always() && github.event_name == 'pull_request' && inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require("fs");
          const p = `${process.env.GITHUB_WORKSPACE}/axle-report.md`;
          if (!fs.existsSync(p)) {
            core.warning("axle: no report to comment with");
            return;
          }
          const body = fs.readFileSync(p, "utf8");
          const marker = "<!-- axle-report -->";
          const fullBody = `${marker}\n${body}`;
          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo,
            issue_number: context.issue.number,
            per_page: 100,
          });
          const existing = comments.find((c) => c.body?.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              ...context.repo,
              comment_id: existing.id,
              body: fullBody,
            });
          } else {
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: fullBody,
            });
          }

    - name: Open / update / close axle issues
      if: always() && inputs.create-issues == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require("fs");
          const crypto = require("crypto");
          const p = `${process.env.GITHUB_WORKSPACE}/axle-report.json`;
          if (!fs.existsSync(p)) {
            core.warning("axle: no JSON report — skipping issue management");
            return;
          }
          const report = JSON.parse(fs.readFileSync(p, "utf8"));
          // CI script writes `{ result: ScanResult, fixes: Record<key, FixResult> }`.
          // The legacy callers may flatten this — accept both shapes.
          const violations = Array.isArray(report?.result?.violations)
            ? report.result.violations
            : Array.isArray(report?.violations)
            ? report.violations
            : [];
          const fixesByKey = (report?.fixes ?? {});

          // Filter by severity threshold (default to fail-on if not set)
          const rank = { critical: 0, serious: 1, moderate: 2, minor: 3 };
          const issueFailOn = "${{ inputs.issue-fail-on }}" || "${{ inputs.fail-on }}";
          const threshold = rank[issueFailOn] ?? 1;
          const eligible = violations.filter(
            (v) => (rank[v.impact] ?? 4) <= threshold
          );

          // Build a stable key per violation: rule + first-node-target hash.
          // Same violation across runs maps to same key -> same issue updated.
          const keyFor = (v) => {
            const target = (v.nodes?.[0]?.target ?? []).join(">");
            const h = crypto
              .createHash("sha1")
              .update(`${v.id}::${target}`)
              .digest("hex")
              .slice(0, 8);
            return `axle:${v.id}:${h}`;
          };

          const labels = "${{ inputs.issue-labels }}"
            .split(",")
            .map((l) => l.trim())
            .filter(Boolean);

          // Fetch all issues with the marker label so we can close ones
          // that no longer correspond to a current violation.
          const { data: openIssues } = await github.rest.issues.listForRepo({
            ...context.repo,
            state: "open",
            labels: labels[0] || "axle",
            per_page: 100,
          });
          const existingByKey = new Map();
          for (const issue of openIssues) {
            const m = /<!--\s*(axle:[^\s]+)\s*-->/.exec(issue.body || "");
            if (m) existingByKey.set(m[1], issue);
          }

          let opened = 0,
            updated = 0,
            closed = 0;

          // Open or update issues for eligible current violations
          for (const v of eligible) {
            const key = keyFor(v);
            const title = `[a11y] ${v.id}: ${(v.help || "").slice(0, 100)}`;
            const wcagTags = (v.tags || []).filter((t) =>
              t.startsWith("wcag")
            );
            const firstNode = v.nodes?.[0] ?? {};
            // Look up the AI fix for the first node of this violation.
            // FixResult shape: { explanation, fix_strategy, confidence, manual_review_needed, patches:[{before,after,notes}] }
            const fixRecord = fixesByKey[`${v.id}-0`];
            let fix = null;
            if (fixRecord?.patches?.length) {
              fix = fixRecord.patches
                .map((p) => `- ${p.before}\n+ ${p.after}${p.notes ? `\n# ${p.notes}` : ""}`)
                .join("\n\n");
            }
            const body =
              `<!-- ${key} -->\n` +
              `**Rule:** \`${v.id}\` · **Impact:** ${v.impact || "minor"}\n` +
              `**WCAG:** ${wcagTags.join(" · ") || "—"}\n` +
              `**Affects:** ${v.nodes?.length ?? 0} element(s)\n\n` +
              `${v.help || v.description || ""}\n\n` +
              `<details><summary>First failing element</summary>\n\n` +
              "```html\n" +
              `${(firstNode.html || "").slice(0, 800)}\n` +
              "```\n\n" +
              `Target: \`${(firstNode.target || []).join(" > ")}\`\n` +
              `</details>\n\n` +
              (fix
                ? `<details open><summary>Suggested fix (Claude)</summary>\n\n\`\`\`diff\n${fix}\n\`\`\`\n</details>\n\n`
                : "") +
              `Docs: ${v.helpUrl || "—"}\n\n` +
              `---\n` +
              `<sub>Managed by [axle](https://axle-iota.vercel.app). Auto-closed when this violation no longer appears in scans. Edit the title to take over — the marker comment is what axle keys on.</sub>`;

            const issueLabels = [
              ...labels,
              ...(v.impact ? [v.impact] : []),
            ];

            const existing = existingByKey.get(key);
            if (existing) {
              existingByKey.delete(key);
              if (existing.body !== body) {
                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: existing.number,
                  body,
                  labels: issueLabels,
                });
                updated++;
              }
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: issueLabels,
              });
              opened++;
            }
          }

          // Anything left in existingByKey is no longer a current violation
          // → close it as resolved
          for (const [key, issue] of existingByKey.entries()) {
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body:
                "axle: this violation no longer appears in the latest scan " +
                `(${process.env.GITHUB_SHA?.slice(0, 7) || "?"}). ` +
                "Auto-closing. Reopen if you believe this is wrong.",
            });
            await github.rest.issues.update({
              ...context.repo,
              issue_number: issue.number,
              state: "closed",
              state_reason: "completed",
            });
            closed++;
          }

          core.notice(
            `axle issues: opened ${opened}, updated ${updated}, closed ${closed}`
          );
